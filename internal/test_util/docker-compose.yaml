services:
  c-chain-db:
    image: "mysql"
    environment:
      MYSQL_ROOT_PASSWORD: "root"
    volumes:
      - ./dump.sql:/docker-entrypoint-initdb.d/db_init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "--silent", "--host", "localhost", "-proot" ]
      timeout: 20s
      retries: 10
    ports:
      - "127.0.0.1:3306:3306"
  xrp-indexer-db:
    image: "postgres"
    environment:
      POSTGRES_USER: "username"
      POSTGRES_PASSWORD: "password"
    volumes:
      - ./indexer-db-init.sql:/docker-entrypoint-initdb.d/db_init.sql
    ports:
      - "127.0.0.1:5432:5432"